name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version-file: '.java-version'
          cache: 'maven'

      - name: Build
        run: mvn package --batch-mode --no-snapshot-updates -DskipTests

      - name: Extract changelog for this version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract the section between this version header and the next version header
          echo "# ChangeLog" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          sed -n "/^## ${TAG}/,/^## [v]/p" CHANGELOG.md | sed '$ d' >> /tmp/release-notes.md
          # If extraction failed (empty), fallback to a simple message
          if [ $(wc -l < /tmp/release-notes.md) -le 2 ]; then
            echo "# ChangeLog" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            echo "Release ${TAG}" >> /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            echo "For detailed changes, see commits." >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            bukkit/target/FastLoginPlusBukkit.jar
            folia/target/FastLoginPlusFolia.jar
            bungee/target/FastLoginPlusBungee.jar
            velocity/target/FastLoginPlusVelocity.jar
