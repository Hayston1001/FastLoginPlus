# project data for Folia in order to register our plugin with all it's components
# ${-} are variables from Maven (pom.xml) which will be replaced after the build
name: FastLoginPlus
version: ${revision}-${git.commit.id.abbrev}
main: com.github.games647.fastlogin.bukkit.FastLoginBukkit
folia-supported: 'true'

# meta data for plugin managers
authors: [Hayston, games647]
description: |
    Login plugin for premium players
website: ''
dev-url: ''

# This plugin doesn't have to be transformed for compatibility with Minecraft >= 1.13
api-version: '1.13'

softdepend:
    # We depend on either ProtocolLib or ProtocolSupport
    - ProtocolSupport
    - ProtocolLib
    # Premium variable
    - PlaceholderAPI
    # Bedrock Player Bridge
    - Geyser-Spigot
    - floodgate
    # Auth plugins
    - AuthMe
    - CrazyLogin
    - LoginSecurity
    - LogIt
    - UltraAuth
    - xAuth
    # Skin plugins
    - SkinsRestorer

commands:
    flp:
        description: 'FastLoginPlus commands'
        usage: /<command> premium|cracked|delete [player]

permissions:
    ${project.artifactId}.command.premium:
        description: 'Label themselves as premium'
        default: true

    ${project.artifactId}.command.premium.other:
        description: 'Label others as premium'
        children:
            ${project.artifactId}.command.premium: true

    ${project.artifactId}.command.cracked:
        description: 'Label themselves as cracked'
        default: op

    ${project.artifactId}.command.cracked.other:
        description: 'Label others as cracked'
        children:
            ${project.artifactId}.command.cracked: true

    ${project.artifactId}.command.delete:
        description: 'Delete a player record from the FastLogin database'
        default: op
